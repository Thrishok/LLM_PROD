<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZORA- AI Assistant</title>
  <link rel="icon" type="image/png" href="/logo_icon.png?v=3" />
  <link rel="stylesheet" href="/style.css?v=21" />
</head>
<body>
  <div class="layout">
    <!-- Chat history sidebar (logged-in users only) -->
    <aside id="sidebar" class="sidebar" hidden>
      <button id="new-chat-btn" class="new-chat-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New chat
      </button>
      <div class="conv-list-label">Recent chats</div>
      <div id="conv-list" class="conv-list"></div>

      <!-- User + sign out, pinned to the bottom -->
      <div class="sidebar-footer">
        <div id="user-badge" class="user-badge" hidden>
          <img id="user-avatar" class="user-avatar" alt="" hidden />
          <span id="user-initials" class="user-avatar user-initials" hidden></span>
          <span id="user-name" class="user-name"></span>
        </div>
        <a id="signout-link" href="/auth/logout" class="signout-icon-btn"
           title="Sign out" aria-label="Sign out" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </a>
      </div>
    </aside>

    <!-- Dimmed backdrop behind the sidebar on mobile (tap to close) -->
    <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

    <div class="app">
      <header class="header">
        <div class="header-title">
          <button id="sidebar-toggle" class="icon-btn" type="button" aria-label="Toggle sidebar" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <a href="/" class="logo-home" title="Refresh ZORA">
            <img src="/logo_icon.png?v=3" alt="" class="header-logo-img" />
            <h1>ZORA</h1>
          </a>
        </div>
        <div class="header-actions">
          <div class="header-user-wrap">
            <button id="header-user" class="header-user" type="button" aria-label="Account menu" hidden>
              <img id="header-avatar" class="user-avatar" alt="" hidden />
              <span id="header-initials" class="user-avatar user-initials" hidden></span>
            </button>
            <div id="user-menu" class="user-menu" hidden>
              <div class="user-menu-head">
                <div id="menu-name" class="user-menu-name"></div>
                <div id="menu-email" class="user-menu-email"></div>
              </div>
              <button id="theme-toggle" class="user-menu-item theme-row" type="button"
                      role="switch" aria-checked="false">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                <span id="theme-label">Light mode</span>
                <span class="switch"><span class="switch-knob"></span></span>
              </button>
            </div>
          </div>
          <a id="signin-link" href="/login" class="reset-btn signin-btn" title="Sign in" hidden>Sign in</a>
        </div>
      </header>

      <main id="messages" class="messages"></main>

      <form id="chat-form" class="composer">
        <div id="attach-preview" class="attach-preview" hidden></div>
        <div class="composer-pill">
          <button id="attach-btn" type="button" class="attach-btn"
                  aria-label="Attach a file" title="Attach a file (JPG, PNG, DOC, PDF)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <input id="file-input" type="file" accept=".jpg,.jpeg,.png,.doc,.docx,.pdf" hidden />
          <textarea
            id="input"
            class="input"
            placeholder="Message ZORA…"
            rows="1"
            autocomplete="off"
          ></textarea>
          <button id="send-btn" type="submit" class="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="composer-hint">ZORA is AI-powered and can make mistakes — please verify important information.</p>
      </form>

      <footer class="app-footer">
        <span class="app-footer-copy">&copy; 2026 ZORA AI. All rights reserved.</span>
        <span class="app-footer-sep" aria-hidden="true">·</span>
        <a href="/terms" class="app-footer-link">Terms of Use</a>
      </footer>
    </div>
  </div>

  <script src="/script.js?v=14"></script>
</body>
</html>
